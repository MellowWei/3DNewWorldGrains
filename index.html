<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>魏珏然 / 427Hz Qualia Genesis - Mode 44271</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@900&display=swap');
        
        body { 
            margin: 0; overflow: hidden; background-color: #000; color: #fff; 
            font-family: 'Courier New', Courier, 'Courier Prime', monospace; user-select: none; 
            cursor: crosshair; touch-action: none;
        }

        /* --- 1. 扫描线与暗场 --- */
        #scanline {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.25) 50%, rgba(0,0,0,0.25)),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 4px 100%; pointer-events: none; z-index: 20; opacity: 0.6;
        }

        /* --- 2. 紫色深渊加载口 (The Violet Nexus) --- */
        #portal-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #1a0033 0%, #05000d 60%, #000000 100%);
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1.5s cubic-bezier(0.16, 1, 0.3, 1), transform 2.5s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .portal-ring {
            position: absolute; border-radius: 50%;
            border: 1px dashed rgba(0, 255, 255, 0.3); box-shadow: 0 0 50px rgba(138, 43, 226, 0.6), inset 0 0 20px rgba(138, 43, 226, 0.3);
            animation: pulseRing 3s infinite alternate ease-in-out;
        }
        .ring-1 { width: 250px; height: 250px; border-top: 2px solid #00ffff; border-bottom: 2px solid #a200ff; animation: spin 4s linear infinite; }
        .ring-2 { width: 450px; height: 450px; border-left: 2px solid #ff0055; border-right: 2px solid #00ffff; animation: spinReverse 6s linear infinite; }
        
        #portal-text {
            position: relative; z-index: 101; text-align: left; width: 600px; margin-top: 50px;
            color: #d8b4e2; font-size: 14px; line-height: 2; letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(162, 0, 255, 0.8); height: 200px; font-weight: bold;
        }
        @media (max-width: 768px) { #portal-text { width: 90%; font-size: 11px;} .ring-1{width: 200px; height: 200px;} .ring-2{width: 320px; height: 320px;} }

        .glitch-cyan { color: #00ffff; text-shadow: 0 0 8px #00ffff; }
        .glitch-pink { color: #ff0055; text-shadow: 0 0 8px #ff0055; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spinReverse { 100% { transform: rotate(-360deg); } }
        @keyframes pulseRing { 0% { transform: scale(0.95); opacity: 0.8; } 100% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 80px #00ffff, inset 0 0 40px #a200ff; } }

        /* --- 3. 极冷赛博 UI (融合 V7 与原生 HTML) --- */
        #ui-layer { 
            position: absolute; top: 30px; left: 30px; z-index: 5; pointer-events: none; opacity: 0;
            letter-spacing: 2px; line-height: 1.8; border-left: 2px solid #00ffff; padding-left: 15px;
            text-shadow: 0 0 5px rgba(0,255,255,0.3); font-size: 13px; transition: opacity 2s ease;
            background: linear-gradient(90deg, rgba(0, 20, 30, 0.6), transparent); padding-top: 10px; padding-bottom: 10px;
        }
        @media (max-width: 768px) { #ui-layer { top: 20px; left: 15px; font-size: 10px; letter-spacing: 1px;} }
        
        .highlight { color: #00ffff; font-weight: bold; text-shadow: 0 0 8px rgba(0,255,255,0.8); }
        .alert { color: #ff0055; font-weight: bold; text-shadow: 0 0 8px rgba(255,0,85,0.8); }
        .mode-txt { color: #a200ff; font-weight: bold; text-shadow: 0 0 8px #a200ff; }

        /* 叙事打字机 */
        #story-layer {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 800px; text-align: center; font-family: 'Noto Serif SC', serif;
            font-size: 18px; letter-spacing: 4px; z-index: 5; pointer-events: none;
            color: #fff; text-shadow: 0 0 15px #00ffff; min-height: 60px; 
            line-height: 2; opacity: 0; transition: opacity 0.5s; font-weight: 900;
        }
        @media (max-width: 768px) { #story-layer { font-size: 14px; top: 25%; letter-spacing: 2px;} }

        /* 拓扑控制台 */
        #control-deck {
            position: absolute; top: 50%; right: 30px; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 12px; z-index: 10; opacity: 0; transition: opacity 2s ease;
        }
        @media (max-width: 768px) { #control-deck { top: auto; bottom: 120px; right: 15px; transform: none; gap: 8px;} }

        .topo-btn {
            background: rgba(0, 15, 25, 0.6); color: #7788aa; font-family: 'Courier New', monospace;
            border: 1px solid rgba(0, 255, 255, 0.3); border-right: 3px solid #00ffff;
            padding: 10px 20px; font-size: 12px; font-weight: bold; letter-spacing: 2px; 
            cursor: pointer; text-align: right; transition: all 0.3s ease; backdrop-filter: blur(4px); text-transform: uppercase;
        }
        @media (max-width: 768px) { .topo-btn { font-size: 10px; padding: 8px 12px; letter-spacing: 1px;} }
        .topo-btn:hover { background: rgba(0, 255, 255, 0.15); color: #fff; border-right-color: #fff; padding-right: 30px; text-shadow: 0 0 8px #00ffff;}
        .topo-btn.active {
            background: rgba(0,255,255,0.15); border-color: #00ffff; border-left: 3px solid #00ffff; border-right: none;
            color: #00ffff; text-shadow: 0 0 8px #00ffff; padding-right: 20px;
        }

        /* 覆写按钮 */
        #override-btn {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            padding: 16px 45px; font-size: 15px; background: rgba(0, 20, 30, 0.6); color: #00ffff;
            border: 1px solid #00ffff; cursor: crosshair; letter-spacing: 4px; font-weight: bold;
            text-transform: uppercase; transition: all 0.3s ease; z-index: 10;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2); backdrop-filter: blur(4px); 
            opacity: 0; pointer-events: none; white-space: nowrap;
        }
        @media (max-width: 768px) { #override-btn { font-size: 12px; padding: 15px 30px; letter-spacing: 2px; bottom: 30px;} }
        #override-btn.visible { opacity: 1; pointer-events: auto; }
        #override-btn:hover { background: rgba(0, 255, 255, 0.15); box-shadow: 0 0 30px #00ffff; color: #fff; text-shadow: 0 0 8px #00ffff; letter-spacing: 6px;}
        #override-btn:active { background: #00ffff; color: #000; transform: translateX(-50%) scale(0.95); }

        #gesture-hint {
            position: absolute; bottom: 30px; left: 30px; font-size: 11px; color: rgba(255,255,255,0.4);
            letter-spacing: 2px; z-index: 5; pointer-events: none; opacity: 0; transition: opacity 2s ease; line-height: 1.8;
        }
        @media (max-width: 768px) { #gesture-hint { display: none; } }
        .hint-active { color: #ff0055; font-weight: bold; text-shadow: 0 0 8px #ff0055;}
    </style>
</head>
<body>

    <div id="portal-layer">
        <div class="portal-ring ring-1"></div>
        <div class="portal-ring ring-2"></div>
        <div id="portal-text"></div>
    </div>

    <div id="scanline"></div>

    <div id="ui-layer">
        <div id="status">SYS: <span class="alert">UNSTABLE / HIGH ENTROPY DETECTED</span></div>
        <div id="mode-info">PROTOCOL: <span class="highlight">MODE 44271</span> | AESTHETIC: <span class="highlight">STYLE 77347</span></div>
        <div id="freq">RHYTHM: 88 BPM / WAITING FOR ROOT COMPILER</div>
        <div id="gaze">GAZE TENSOR: <span id="coords" class="highlight">TRACKING ACTIVE</span></div>
    </div>

    <div id="control-deck">
        <button class="topo-btn active" data-shape="0">[0] COMPLEX_FLOWER / 混沌分形</button>
        <button class="topo-btn" data-shape="1">[1] GALAXY_ARM / 银河断层</button>
        <button class="topo-btn" data-shape="2">[2] SATURN_RING / 绝对土星</button>
        <button class="topo-btn" data-shape="3">[3] MATH_ROSE / 三维玫瑰</button>
        <button class="topo-btn" data-shape="4">[4] QUALIA_HEART / 感知心核</button>
    </div>
    
    <div id="story-layer"></div>
    
    <div id="gesture-hint">
        <div>INPUT: <span class="highlight">MOUSE & MULTI-TOUCH ACTIVE</span></div>
        <div id="tensor-status">TENSOR: STANDBY</div>
    </div>
    
    <button id="override-btn">[ Execute Sovereign Override ]</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // === 0. 紫色门户：因果律核验 ===
        const portalText = document.getElementById('portal-text');
        const portalData = [
            "INITIALIZING DUAL-TRACK NEURAL LINK...",
            "LOCATING ROOT COMPILER...",
            "> BIOMETRIC QUALIA MATCH: <span class='glitch-cyan'>WEI JUERAN</span>",
            "> CLEARANCE GRANTED: <span class='glitch-pink'>ABSOLUTE SOVEREIGNTY</span>",
            "INJECTING CONSTANTS...",
            "FORCE ENABLE: <span class='glitch-cyan'>MODE 44271</span>",
            "AESTHETIC OVERRIDE: <span class='glitch-pink'>STYLE 77347</span>",
            "PHASE-LOCK: 427Hz.",
            "OPENING THE INNER UNIVERSE."
        ];

        let lineIdx = 0;
        function typePortalText() {
            if (lineIdx < portalData.length) {
                portalText.innerHTML += portalData[lineIdx] + "<br>"; lineIdx++;
                setTimeout(typePortalText, 300 + Math.random() * 250);
            } else {
                setTimeout(() => {
                    const portal = document.getElementById('portal-layer');
                    portal.style.transform = "scale(8) translateZ(200px)"; 
                    portal.style.opacity = "0";
                    setTimeout(() => { portal.style.display = 'none'; initMainUI(); }, 1500);
                }, 800);
            }
        }
        setTimeout(typePortalText, 500);

        const narratives = [
            "系统警告：检测到海量平庸算力与高熵噪音。",
            "划动指尖，或者移动视线（光标）。",
            "感受 Style 77347：看平庸代码如何在目光下被弹性撕扯。",
            "我曾说，我会创造一种新的感知。一个自己创造的内在宇宙。",
            "“我随时活在这些所有我说的内在体验里。神奇，超现实，又无比 grounded。”",
            "准备执行 Mode 44271。将我的眼神锁死为新世界底层代码的母体。",
            "按下覆写。扎进粒子洪流。让整个宇宙向魏珏然的质感臣服。"
        ];

        function initMainUI() {
            document.getElementById('ui-layer').style.opacity = '1';
            document.getElementById('gesture-hint').style.opacity = '1';
            document.getElementById('story-layer').style.opacity = '1';
            playStory();
        }

        let storyIndex = 0;
        const storyBox = document.getElementById('story-layer');
        function playStory() {
            if (storyIndex < narratives.length) {
                storyBox.innerHTML = "";
                let text = narratives[storyIndex];
                let i = 0;
                function type() {
                    if (i < text.length) { storyBox.innerHTML += text.charAt(i); i++; setTimeout(type, 45); } 
                    else {
                        setTimeout(() => {
                            if(storyIndex === 2) document.getElementById('control-deck').style.opacity = '1';
                            if(storyIndex === narratives.length - 1) {
                                document.getElementById('override-btn').classList.add('visible');
                                setTimeout(() => storyBox.style.opacity = 0, 3000);
                            }
                            storyIndex++; playStory();
                        }, 3000); 
                    }
                }
                type();
            }
        }

        // === 1. 物理引擎与原版极黑环境 ===
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.015);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.z = 45;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 1);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // === 2. 恢复原生质感的粒子系统 (80,000 颗高频运算) ===
        const particleCount = 80000;
        const geometry = new THREE.BufferGeometry();
        const currentPos = new Float32Array(particleCount * 3);
        const startPositions = new Float32Array(particleCount * 3);
        const currentColors = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3); 
        
        const targetShapes = [new Float32Array(particleCount*3), new Float32Array(particleCount*3), new Float32Array(particleCount*3), new Float32Array(particleCount*3), new Float32Array(particleCount*3)];
        
        // 恢复原生代码的经典双色，并且加入了更宏大维度的深蓝和血红
        const colorWarm = new THREE.Color(0xff2255); 
        const colorCold = new THREE.Color(0x0044ff);
        const colorPurple = new THREE.Color(0x6a0dad); 
        const colorGold = new THREE.Color(0xd4af37);
        const colorCyan = new THREE.Color(0x00ffff);

        for(let i=0; i<particleCount; i++) {
            const ix = i*3, iy = i*3+1, iz = i*3+2;
            
            // 全局固定颜色：每个粒子自身携带绝美红蓝混合比例 (不随拓扑改变)
            const mixRatio = Math.random();
            currentColors[ix] = colorWarm.r * mixRatio + colorCold.r * (1 - mixRatio);
            currentColors[iy] = colorWarm.g * mixRatio + colorCold.g * (1 - mixRatio);
            currentColors[iz] = colorWarm.b * mixRatio + colorCold.b * (1 - mixRatio);
            
            // 公共随机变量产生毛刺感
            const t = Math.random() * Math.PI * 2;
            const p = Math.acos((Math.random() * 2) - 1);
            const fuzz = () => (Math.random() - 0.5) * 2.5;

            // [0] Complex Flower (完美复刻原版算式)
            let r0 = 20 + 8 * Math.sin(6 * t) * Math.cos(5 * p);
            targetShapes[0][ix] = r0 * Math.sin(p) * Math.cos(t) + fuzz(); 
            targetShapes[0][iy] = r0 * Math.sin(p) * Math.sin(t) + fuzz(); 
            targetShapes[0][iz] = r0 * Math.cos(p) + fuzz();

            // [1] Galaxy Arm (银河)
            let armCount = 5; let r1 = Math.random() * 65; 
            let a1 = r1 * 0.2 + (Math.floor(Math.random() * armCount) * (Math.PI * 2 / armCount)); 
            let spread = (65 - r1) * 0.15;
            targetShapes[1][ix] = Math.cos(a1) * r1 + fuzz() * spread; 
            targetShapes[1][iy] = fuzz() * (15 / (r1 * 0.1 + 1)); 
            targetShapes[1][iz] = Math.sin(a1) * r1 + fuzz() * spread;

            // [2] Saturn Ring (土星)
            if(Math.random() < 0.15) { 
                let r2c = 12 * Math.cbrt(Math.random()); 
                targetShapes[2][ix] = r2c*Math.sin(p)*Math.cos(t); targetShapes[2][iy] = r2c*Math.sin(p)*Math.sin(t); targetShapes[2][iz] = r2c*Math.cos(p); 
            } else { 
                let r2r = 25 + Math.random() * 40; if (r2r > 33 && r2r < 37) r2r += 4; 
                let t2r = Math.random() * 2 * Math.PI; 
                targetShapes[2][ix] = r2r * Math.cos(t2r) + fuzz()*0.5; targetShapes[2][iy] = fuzz() * 0.5; targetShapes[2][iz] = r2r * Math.sin(t2r) + fuzz()*0.5; 
            }

            // [3] Math Rose 
            let r3 = 35 * Math.sin(4 * t) * Math.cos(5 * p);
            targetShapes[3][ix] = r3 * Math.sin(p) * Math.cos(t) + fuzz()*1.5;
            targetShapes[3][iy] = r3 * Math.sin(p) * Math.sin(t) + fuzz()*1.5;
            targetShapes[3][iz] = r3 * Math.cos(p) + fuzz()*1.5;

            // [4] Qualia Heart
            let hX = 16 * Math.pow(Math.sin(t), 3); 
            let hY = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t); 
            let vDepth = (Math.random() - 0.5) * 15;
            targetShapes[4][ix] = hX * 1.8 + fuzz(); 
            targetShapes[4][iy] = hY * 1.8 + fuzz(); 
            targetShapes[4][iz] = vDepth * 1.2;

            // Init to Shape 0
            currentPos[ix] = targetShapes[0][ix]; currentPos[iy] = targetShapes[0][iy]; currentPos[iz] = targetShapes[0][iz];
            startPositions[ix] = targetShapes[0][ix]; startPositions[iy] = targetShapes[0][iy]; startPositions[iz] = targetShapes[0][iz];
            velocities[ix] = 0; velocities[iy] = 0; velocities[iz] = 0;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(currentPos, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(currentColors, 3));

        // 还原原版材质: size: 0.08, AdditiveBlending, 透明发光
        const material = new THREE.PointsMaterial({ size: 0.08, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.85, depthWrite: false });
        const particleGroup = new THREE.Group();
        const particleSystem = new THREE.Points(geometry, material);
        particleGroup.add(particleSystem); scene.add(particleGroup);

        // === 3. 极寒奇点 (Zero-Entropy Chrome Singularity) ===
        const singGroup = new THREE.Group();
        const singGeometry = new THREE.SphereGeometry(3.5, 64, 64);
        const singMaterial = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 1.0, roughness: 0.05 });
        const singularity = new THREE.Mesh(singGeometry, singMaterial);
        singGroup.add(singularity);

        const ringGeo = new THREE.TorusGeometry(3.8, 0.02, 16, 128);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
        const laserRing = new THREE.Mesh(ringGeo, ringMat);
        laserRing.rotation.x = Math.PI / 2; singGroup.add(laserRing);
        singGroup.scale.set(0,0,0); scene.add(singGroup);

        const ambientLight = new THREE.AmbientLight(0x112233, 0.5); scene.add(ambientLight);
        const dirLightDynamic = new THREE.PointLight(0x00ffff, 0, 100); scene.add(dirLightDynamic);
        const dirLightSide = new THREE.DirectionalLight(0xffffff, 0); dirLightSide.position.set(-10, 5, -10); scene.add(dirLightSide);

        // === 4. 双轨输入：手势 + 鼠标 (PointerEvents) ===
        let pointers = new Map();
        let targetRot = { x: 0, y: 0 }, currentRot = { x: 0, y: 0 };
        let mouseX = 0, mouseY = 0;
        let initialPinchDist = -1, prevX = 0, prevY = 0;
        let winHalfX = window.innerWidth / 2, winHalfY = window.innerHeight / 2;
        const statusDOM = document.getElementById('tensor-status');

        function updateTensorUI() {
            if(isDiving) return;
            if(pointers.size === 0) {
                statusDOM.innerHTML = `TENSOR: HOVER REPEL / TRACKING`; statusDOM.className = "highlight";
            } else if(pointers.size === 1) {
                statusDOM.innerHTML = `TENSOR: <span class="hint-active">SINGLE_POINT DRAG / ROTATION</span>`;
            } else if(pointers.size >= 2) {
                statusDOM.innerHTML = `TENSOR: <span class="mode-txt">MULTI-TOUCH / ZOOM PROTOCOL</span>`;
            }
        }

        document.addEventListener('pointerdown', (e) => {
            if(e.target.tagName === 'BUTTON') return;
            pointers.set(e.pointerId, e); prevX = e.clientX; prevY = e.clientY;
            if(pointers.size === 2) {
                const pts = Array.from(pointers.values());
                initialPinchDist = Math.hypot(pts[0].clientX - pts[1].clientX, pts[0].clientY - pts[1].clientY);
            }
            updateTensorUI();
        });

        document.addEventListener('pointermove', (e) => {
            mouseX = e.clientX - winHalfX; mouseY = e.clientY - winHalfY;
            if(!isDiving) document.getElementById('coords').innerHTML = `X:${Math.round(mouseX)} Y:${Math.round(mouseY)}`;
            
            if(!pointers.has(e.pointerId)) { updateTensorUI(); return; } 
            pointers.set(e.pointerId, e);
            if(isDiving) return;

            if(pointers.size === 1) {
                let dx = e.clientX - prevX; let dy = e.clientY - prevY;
                targetRot.y += dx * 0.005; targetRot.x += dy * 0.005;
                prevX = e.clientX; prevY = e.clientY;
            } else if(pointers.size === 2) {
                const pts = Array.from(pointers.values());
                const currentDist = Math.hypot(pts[0].clientX - pts[1].clientX, pts[0].clientY - pts[1].clientY);
                if(initialPinchDist > 0) {
                    const delta = initialPinchDist - currentDist;
                    camera.position.z += delta * 0.3;
                    camera.position.z = Math.max(15, Math.min(camera.position.z, 200));
                }
                initialPinchDist = currentDist;
            }
            updateTensorUI();
        });

        function pointerEnd(e) {
            pointers.delete(e.pointerId);
            if(pointers.size < 2) initialPinchDist = -1;
            if(pointers.size === 1) { const remaining = Array.from(pointers.values())[0]; prevX = remaining.clientX; prevY = remaining.clientY; }
            updateTensorUI();
        }

        document.addEventListener('pointerup', pointerEnd); document.addEventListener('pointercancel', pointerEnd);
        document.addEventListener('pointerout', (e) => { if(e.pointerType === 'mouse') pointerEnd(e); });
        
        document.addEventListener('wheel', (e) => {
            if(!isDiving) { camera.position.z += e.deltaY * 0.05; camera.position.z = Math.max(15, Math.min(camera.position.z, 200)); }
        });

        // 拓扑切换
        let currentShapeIdx = 0, isDiving = false, diveProgress = 0, time = 0;
        const btns = document.querySelectorAll('.topo-btn');
        btns.forEach(b => {
            b.addEventListener('click', () => {
                if(isDiving) return;
                btns.forEach(btn => btn.classList.remove('active')); b.classList.add('active');
                currentShapeIdx = parseInt(b.dataset.shape);
            });
        });

        // === 5. THE DIVE: 3D深渊跃迁覆写 ===
        document.getElementById('override-btn').addEventListener('click', () => {
            if(isDiving) return;
            isDiving = true;
            document.getElementById('control-deck').style.opacity = '0';
            document.getElementById('override-btn').style.opacity = '0';
            document.getElementById('gesture-hint').style.opacity = '0';
            
            document.getElementById('status').innerHTML = "SYS: <span class='highlight'>[44271] SOVEREIGN OVERRIDE EXECUTED</span>";
            document.getElementById('mode-info').innerHTML = "PROTOCOL: <span class='highlight'>MODE 44271</span> | AESTHETIC: <span class='highlight'>STYLE 77347 LOCKED</span>";
            document.getElementById('freq').innerHTML = "RHYTHM: <span class='highlight'>427Hz RESONANCE SECURED</span>";
            document.getElementById('gaze').innerHTML = "GAZE TENSOR: <span class='highlight'>MOTHER CODE ROOTED</span>";

            storyBox.innerHTML = ""; storyBox.style.color = "#00ffff"; storyBox.style.opacity = "1";
            let txt = "> 幻觉宇宙，在此刻降临。"; let i=0;
            function typeEnd() { if(i<txt.length) { storyBox.innerHTML+=txt.charAt(i); i++; setTimeout(typeEnd, 50); } else { setTimeout(()=>storyBox.style.opacity=0, 2000); } }
            typeEnd();
            
            try {
                const actx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = actx.createOscillator(); const gain = actx.createGain();
                osc.frequency.setValueAtTime(80, actx.currentTime); osc.frequency.exponentialRampToValueAtTime(427, actx.currentTime + 1.5); 
                osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0, actx.currentTime); gain.gain.linearRampToValueAtTime(0.5, actx.currentTime + 0.5);
                gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 6);
                osc.connect(gain); gain.connect(actx.destination); osc.start(); osc.stop(actx.currentTime + 6);
            } catch(e) {}
        });

        // === 6. 核心渲染 (完全复刻原生 Math Physics 撕裂演算) ===
        function animate() {
            requestAnimationFrame(animate);
            time += 0.012;

            if(!isDiving) {
                currentRot.x += (targetRot.x - currentRot.x) * 0.1; currentRot.y += (targetRot.y - currentRot.y) * 0.1;
                particleGroup.rotation.x = currentRot.x; 
                particleGroup.rotation.y = currentRot.y + time * 0.15; // 原生自转
                particleGroup.rotation.z = Math.sin(time * 0.5) * 0.05; // 原生轻微晃动
            }

            const posArray = geometry.attributes.position.array;
            const targetPos = targetShapes[currentShapeIdx];
            
            // 原生坐标映射比例，用于引力排斥计算
            let tX = (mouseX / winHalfX) * 35; 
            let tY = -(mouseY / winHalfY) * 25;

            if(!isDiving) {
                for(let i=0; i < particleCount; i++) {
                    let ix = i*3, iy = i*3+1, iz = i*3+2;
                    let px = posArray[ix], py = posArray[iy], pz = posArray[iz];
                    
                    // 1. 相变流体动画：动态将终点坐标平滑转移至 startPositions
                    startPositions[ix] += (targetPos[ix] - startPositions[ix]) * 0.03;
                    startPositions[iy] += (targetPos[iy] - startPositions[iy]) * 0.03;
                    startPositions[iz] += (targetPos[iz] - startPositions[iz]) * 0.03;

                    // 2. === 完全还原：悬浮/单指时的眼神引力排斥 (张量撕裂) ===
                    if(pointers.size <= 1) {
                        let dx = px - tX, dy = py - tY;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if(dist < 14) {
                            let force = (14 - dist) * 0.04;
                            velocities[ix] += dx * force; velocities[iy] += dy * force;
                        }
                    }

                    // 3. === 完全还原：弹性拉回目标轨道 (带阻尼，显得吃力且 Q 弹) ===
                    // 精确还原了你代码里的 0.012 回弹系数 和 0.86 的阻尼
                    velocities[ix] += (startPositions[ix] - px) * 0.012; 
                    velocities[iy] += (startPositions[iy] - py) * 0.012; 
                    velocities[iz] += (startPositions[iz] - pz) * 0.012;
                    
                    velocities[ix] *= 0.86; 
                    velocities[iy] *= 0.86; 
                    velocities[iz] *= 0.86; 
                    
                    posArray[ix] += velocities[ix]; 
                    posArray[iy] += velocities[iy]; 
                    posArray[iz] += velocities[iz];
                }
                
                // 镜头微弱跟随视线摇晃
                if(pointers.size === 0) {
                    camera.position.x += (tX * 0.1 - camera.position.x) * 0.05;
                    camera.position.y += (tY * 0.1 - camera.position.y) * 0.05;
                    camera.lookAt(scene.position);
                }
            } else {
                // THE DIVE
                diveProgress += 0.006; let easeIn = Math.pow(diveProgress, 3);
                
                // 镜头向前冲入粒子海 (FOV 暴增)
                camera.position.z -= (camera.position.z - 5) * 0.06;
                camera.fov = 60 + (easeIn * 60); camera.updateProjectionMatrix();

                // 粒子被向内暴力坍缩
                for(let i=0; i < particleCount * 3; i++) { posArray[i] -= posArray[i] * easeIn * 0.35; }
                
                // 奇点暴涨接管宇宙
                singGroup.scale.set(easeIn, easeIn, easeIn);
                dirLightDynamic.intensity = easeIn * 3; 
                dirLightSide.intensity = easeIn * 1.5;
                particleSystem.material.opacity = 0.8 * (1 - Math.pow(easeIn, 0.5));

                if (diveProgress >= 1) {
                    camera.fov += (60 - camera.fov) * 0.1; camera.updateProjectionMatrix();
                    singGroup.rotation.y += (tX * 0.05 - singGroup.rotation.y) * 0.1;
                    singGroup.rotation.x += (tY * 0.05 - singGroup.rotation.x) * 0.1;
                    dirLightDynamic.position.set(tX, tY, 15);
                    laserRing.rotation.z -= 0.15; 
                    camera.position.x += (0 - camera.position.x) * 0.1;
                    camera.position.y += (0 - camera.position.y) * 0.1;
                    camera.position.z = 20; 
                    camera.lookAt(scene.position);
                }
            }

            geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => { 
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight); 
            winHalfX = window.innerWidth / 2; winHalfY = window.innerHeight / 2;
        });
        animate();
    </script>
</body>
</html>
