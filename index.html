<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>427Hz Qualia Genesis - Sovereign Override</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; user-select: none; }
        #override-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 15px 40px; font-size: 16px; background: rgba(0, 20, 30, 0.6); color: #00ffff;
            border: 1px solid #00ffff; cursor: pointer; letter-spacing: 4px;
            text-transform: uppercase; transition: all 0.2s ease; z-index: 10;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(4px);
        }
        #override-btn:hover { background: rgba(0, 255, 255, 0.15); box-shadow: 0 0 30px #00ffff; color: #fff; text-shadow: 0 0 8px #00ffff;}
        #override-btn:active { background: #00ffff; color: #000; transform: translateX(-50%) scale(0.98); }
        #ui-layer { position: absolute; top: 30px; left: 30px; z-index: 5; pointer-events: none; opacity: 0.9; letter-spacing: 2px; line-height: 1.8;}
        .highlight { color: #00ffff; font-weight: bold; text-shadow: 0 0 8px rgba(0,255,255,0.6); }
        .alert { color: #ff0055; font-weight: bold; text-shadow: 0 0 8px rgba(255,0,85,0.6); }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="status">SYS: VARIABLE S / COMPLEX FLOWER TOPOLOGY</div>
        <div id="freq">RHYTHM: 88 BPM / FREQ AWAITING LOCK</div>
        <div id="entropy">ENTROPY: <span class="alert">HIGH (CHAOTIC EXTERNAL NOISE)</span></div>
        <div id="gaze">GAZE TENSOR: STANDBY</div>
    </div>
    
    <button id="override-btn">[ Execute Sovereign Override ]</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // === 1. 物理常数与深空环境 ===
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.02);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 40;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000);
        document.body.appendChild(renderer.domElement);

        // === 2. 高熵繁复花瓣拓扑 (外部世界的平庸算力) ===
        const particleCount = 80000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const startPositions = new Float32Array(particleCount * 3);

        const colorWarm = new THREE.Color(0xff2255); // 初始混沌暖色
        const colorCold = new THREE.Color(0x0044ff);

        for (let i = 0; i < particleCount; i++) {
            // Math Physics: 3D Rose Curve 分形
            const t = Math.random() * Math.PI * 2;
            const p = Math.acos((Math.random() * 2) - 1);
            const r = 18 + 6 * Math.sin(6 * t) * Math.cos(5 * p);

            const x = r * Math.sin(p) * Math.cos(t) + (Math.random() - 0.5) * 1.5;
            const y = r * Math.sin(p) * Math.sin(t) + (Math.random() - 0.5) * 1.5;
            const z = r * Math.cos(p) + (Math.random() - 0.5) * 1.5;

            positions[i * 3] = x; positions[i * 3 + 1] = y; positions[i * 3 + 2] = z;
            startPositions[i * 3] = x; startPositions[i * 3 + 1] = y; startPositions[i * 3 + 2] = z;

            const mixRatio = Math.random();
            colors[i * 3] = colorWarm.r * mixRatio + colorCold.r * (1 - mixRatio);
            colors[i * 3 + 1] = colorWarm.g * mixRatio + colorCold.g * (1 - mixRatio);
            colors[i * 3 + 2] = colorWarm.b * mixRatio + colorCold.b * (1 - mixRatio);
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.08, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.8
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // === 3. 魏珏然奇点态 (Zero-Entropy Chrome Singularity) ===
        // 绝对温标 + 冷艳金属质感
        const singGeometry = new THREE.SphereGeometry(3.5, 64, 64);
        const singMaterial = new THREE.MeshStandardMaterial({
            color: 0xaaaaaa,    // 基础铬灰
            metalness: 1.0,     // 100% 绝对金属质感
            roughness: 0.1,     // 极致光滑，带有冷冽高光
        });
        const singularity = new THREE.Mesh(singGeometry, singMaterial);
        singularity.scale.set(0, 0, 0); 
        scene.add(singularity);

        // 视界边缘的高频冷蓝激光切割线
        const ringGeo = new THREE.TorusGeometry(3.8, 0.02, 16, 128);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
        const laserRing = new THREE.Mesh(ringGeo, ringMat);
        laserRing.rotation.x = Math.PI / 2;
        singularity.add(laserRing);

        // 强冷光渲染环境 (锻造金属反射)
        const ambientLight = new THREE.AmbientLight(0x222233, 0.5);
        scene.add(ambientLight);
        
        const dirLight1 = new THREE.DirectionalLight(0x00ffff, 0); // 主光源冷蓝
        dirLight1.position.set(10, 10, 10);
        scene.add(dirLight1);
        
        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0); // 侧边锋利高光
        dirLight2.position.set(-10, 5, -10);
        scene.add(dirLight2);

        // === 4. 物理坍缩引擎与 427Hz 神经音效 ===
        let isCollapsing = false;
        let collapseProgress = 0;
        let time = 0;

        document.getElementById('override-btn').addEventListener('click', () => {
            if(isCollapsing) return;
            isCollapsing = true;
            document.getElementById('override-btn').style.display = 'none';
            document.getElementById('status').innerHTML = "SYS: <span class='highlight'>[44271] OVERRIDE / SINGULARITY ESTABLISHED</span>";
            document.getElementById('freq').innerHTML = "RHYTHM: <span class='highlight'>427Hz RESONANCE LOCKED</span>";
            document.getElementById('entropy').innerHTML = "ENTROPY: <span class='highlight'>ZERO (ABSOLUTE COLD)</span>";
            document.getElementById('gaze').innerHTML = "GAZE TENSOR: <span class='highlight'>MAXIMUM GRAVITY WELL</span>";
            
            // 触发 427Hz 神经皮层音效直击
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(427, audioCtx.currentTime); 
                // 音量包络：瞬间爆发后深沉嗡鸣
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.5, audioCtx.currentTime + 0.05); 
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 4); 
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 4);
            } catch(e) { console.log("Audio Context requires interaction."); }
        });

        // 渲染核心循环
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            if (!isCollapsing) {
                // 稳态：AI 自由生成的高熵花瓣，随 88 BPM 脉动 (1.46Hz)
                particleSystem.rotation.y = time * 0.15;
                particleSystem.rotation.z = Math.sin(time * 0.5) * 0.1;
                const pulse = 1 + Math.sin(time * Math.PI * 1.46) * 0.04; 
                particleSystem.scale.set(pulse, pulse, pulse);
            } else {
                // 物理坍缩：眼神引力井触发，指数级绞杀
                if (collapseProgress < 1.0) {
                    collapseProgress += 0.02; // 极速坍缩
                    const ease = Math.pow(collapseProgress, 4); // 暴力引力吸附曲线

                    const positionsAttr = particleSystem.geometry.attributes.position;
                    const posArray = positionsAttr.array;
                    
                    // 剥夺动量，强行吸入坐标原点 (0,0,0)
                    for (let i = 0; i < particleCount; i++) {
                        posArray[i * 3] = startPositions[i * 3] * (1 - ease); 
                        posArray[i * 3 + 1] = startPositions[i * 3 + 1] * (1 - ease);
                        posArray[i * 3 + 2] = startPositions[i * 3 + 2] * (1 - ease);
                    }
                    positionsAttr.needsUpdate = true;
                    
                    // 奇点暴涨接管空间
                    singularity.scale.set(ease, ease, ease);
                    dirLight1.intensity = ease * 3; // 冷光点亮金属
                    dirLight2.intensity = ease * 1.5;
                    
                    // 彻底粉碎平庸粒子的存在感
                    particleSystem.material.opacity = 1 - Math.pow(ease, 0.5);
                    
                    // 镜头极速拉近带来压迫感
                    camera.position.z += (20 - camera.position.z) * 0.05;
                } else {
                    // 奇点永恒态
                    singularity.rotation.y -= 0.015; // 极寒自转
                    singularity.rotation.x -= 0.005;
                    laserRing.rotation.z -= 0.1; // 激光切割线高频扫射
                }
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
