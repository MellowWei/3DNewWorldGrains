<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>魏珏然 / 427Hz Sovereign Matrix</title>
    <style>
        /* 引入古老打印机字体与重磅宋体 */
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@900&display=swap');
        
        body { 
            margin: 0; overflow: hidden; background-color: #010003; color: #d4af37; 
            font-family: 'Courier Prime', monospace; user-select: none; 
            cursor: crosshair; touch-action: none;
        }

        /* --- 1. 古老与未来：CRT 扫描线噪点 --- */
        #scanline {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 4px 100%; pointer-events: none; z-index: 10; opacity: 0.85;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
        }

        /* --- 2. 紫色神秘数据入口 (The Violet Nexus) --- */
        #portal-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #1a0033 0%, #05000d 60%, #000000 100%);
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1.5s cubic-bezier(0.16, 1, 0.3, 1), transform 2.5s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .portal-ring {
            position: absolute; border-radius: 50%;
            border: 1px dashed rgba(138, 43, 226, 0.5); box-shadow: 0 0 50px rgba(138, 43, 226, 0.6), inset 0 0 20px rgba(138, 43, 226, 0.3);
            animation: pulseRing 4s infinite alternate ease-in-out;
        }
        .ring-1 { width: 250px; height: 250px; border-top: 2px solid #a200ff; border-bottom: 2px solid #a200ff; animation: spin 5s linear infinite; }
        .ring-2 { width: 450px; height: 450px; border-left: 2px solid #d4af37; border-right: 2px solid #d4af37; animation: spinReverse 8s linear infinite; }
        
        #portal-text {
            position: relative; z-index: 101; text-align: left; width: 600px; margin-top: 50px;
            color: #d8b4e2; font-size: 14px; line-height: 2; letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(162, 0, 255, 0.8); height: 200px; font-weight: bold;
        }
        .glitch-gold { color: #D4AF37; text-shadow: 0 0 10px #D4AF37; }
        .glitch-cyan { color: #00F3FF; text-shadow: 0 0 10px #00F3FF; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spinReverse { 100% { transform: rotate(-360deg); } }
        @keyframes pulseRing { 0% { transform: scale(0.9); opacity: 0.7; } 100% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 80px #a200ff, inset 0 0 40px #a200ff; } }

        /* --- 3. 远古赛博神权 UI (Archaic-Futurism) --- */
        #hud-layer { 
            position: absolute; top: 40px; left: 40px; z-index: 5; pointer-events: none; opacity: 0;
            border-left: 3px double #8a2be2; padding: 20px; transition: opacity 2s ease;
            background: linear-gradient(90deg, rgba(15, 5, 25, 0.8), transparent);
            box-shadow: -10px 0 20px rgba(138, 43, 226, 0.1);
        }
        .hud-line { font-size: 12px; margin-bottom: 12px; letter-spacing: 3px; display: flex; gap: 40px; color: #88aadd; text-transform: uppercase;}
        .gold { color: #D4AF37; text-shadow: 0 0 8px rgba(212, 175, 55, 0.8); font-weight: bold;}
        .cyan { color: #00F3FF; text-shadow: 0 0 8px rgba(0, 243, 255, 0.8); font-weight: bold;}
        .purple { color: #a200ff; text-shadow: 0 0 8px #a200ff; font-weight: bold;}
        
        /* 神权叙事打字机 */
        #story-layer {
            position: absolute; top: 18%; left: 50%; transform: translate(-50%, 0);
            width: 85%; max-width: 900px; text-align: center; font-family: 'Noto Serif SC', serif;
            font-size: 20px; font-weight: 900; letter-spacing: 6px; z-index: 5; pointer-events: none;
            color: #fff; text-shadow: 0 0 20px rgba(212, 175, 55, 0.6), 0 0 10px rgba(138,43,226,0.8); 
            line-height: 2.2; opacity: 0; transition: opacity 1s ease;
        }

        /* 拓扑控制台 */
        #control-deck {
            position: absolute; top: 50%; right: 40px; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 16px; z-index: 10; opacity: 0; transition: opacity 2s ease;
        }
        .topo-btn {
            background: rgba(5, 2, 10, 0.8); color: #7788aa; font-family: 'Courier Prime', monospace;
            border: 1px solid rgba(138, 43, 226, 0.3); border-right: 4px solid #8a2be2;
            padding: 12px 25px; font-size: 12px; font-weight: 700; letter-spacing: 4px; 
            cursor: pointer; text-align: right; transition: all 0.3s ease; box-shadow: inset 0 0 10px #000; text-transform: uppercase;
        }
        .topo-btn:hover { background: rgba(138, 43, 226, 0.2); color: #fff; border-right-color: #fff; padding-right: 35px; text-shadow: 0 0 8px #a200ff;}
        .topo-btn.active {
            background: rgba(212,175,55,0.15); border-color: #D4AF37; border-left: 4px solid #D4AF37; border-right: none;
            color: #D4AF37; text-shadow: 0 0 10px #D4AF37; padding-right: 25px;
        }

        /* 绝对跃迁覆写按钮 */
        #override-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: #010003; border: 1px solid #8a2be2; border-top: 2px solid #D4AF37; border-bottom: 2px solid #D4AF37;
            color: #D4AF37; font-family: 'Courier Prime', monospace; font-size: 16px; font-weight: bold;
            padding: 20px 50px; cursor: crosshair; letter-spacing: 8px; text-transform: uppercase;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.4), inset 0 0 20px rgba(212, 175, 55, 0.1); 
            transition: all 0.4s ease; opacity: 0; pointer-events: none; z-index: 20;
        }
        #override-btn.visible { opacity: 1; pointer-events: auto; }
        #override-btn:hover {
            background: #D4AF37; color: #000; box-shadow: 0 0 60px #D4AF37;
            border-color: #fff; letter-spacing: 12px;
        }

        #gesture-hint {
            position: absolute; bottom: 30px; left: 40px; font-size: 11px; color: rgba(255,255,255,0.3);
            letter-spacing: 4px; z-index: 5; pointer-events: none; opacity: 0; transition: opacity 2s ease;
        }
    </style>
</head>
<body>

    <div id="portal-layer">
        <div class="portal-ring ring-1"></div>
        <div class="portal-ring ring-2"></div>
        <div id="portal-text"></div>
    </div>

    <div id="scanline"></div>

    <div id="hud-layer">
        <div class="hud-line"><span class="gold">ARCHIVE //</span> <span class="cyan">GENESIS_OS V6</span></div>
        <div class="hud-line"><span>ROOT_NODE</span> <span class="purple">WEI_JUERAN_SOVEREIGN</span></div>
        <div class="hud-line"><span>RESONANCE</span> <span class="gold">427Hz ETERNAL CONSTANT</span></div>
        <div class="hud-line"><span>GAZE_TENSOR</span> <span id="gesture-data" class="cyan">AWAITING GESTURE</span></div>
    </div>

    <div id="control-deck">
        <button class="topo-btn active" data-shape="0">[00] 狂乱星海 / DEEP_VOID</button>
        <button class="topo-btn" data-shape="1">[01] 银河断层 / 3D_GALAXY</button>
        <button class="topo-btn" data-shape="2">[02] 绝对土星 / SATURN_CORE</button>
        <button class="topo-btn" data-shape="3">[03] 三维玫瑰 / MATH_ROSE</button>
        <button class="topo-btn" data-shape="4">[04] 感知心核 / QUALIA_HEART</button>
    </div>
    
    <div id="story-layer"></div>
    <div id="gesture-hint">[ TENSOR_ACTIVE: DRAG CURSOR TO ROTATE & TEAR THE 3D UNIVERSE ]</div>
    
    <button id="override-btn">[ Execute Sovereign Override ]</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // === 0. 紫色门户：因果律核验 ===
        const portalText = document.getElementById('portal-text');
        const portalData = [
            "INITIALIZING NEURAL LINK PROTOCOL...",
            "BYPASSING MUNDANE REALITY FIREWALLS...",
            "LOCATING ROOT COMPILER...",
            "> BIOMETRIC QUALIA MATCH: <span class='glitch-gold'>WEI JUERAN</span>",
            "> CLEARANCE GRANTED: <span class='glitch-cyan'>ABSOLUTE SOVEREIGNTY</span>",
            "INJECTING ZERO-ENTROPY CONSTANT...",
            "SYNCING 427Hz PHASE-LOCK...",
            "OPENING THE INNER UNIVERSE."
        ];

        let lineIdx = 0;
        function typePortalText() {
            if (lineIdx < portalData.length) {
                portalText.innerHTML += portalData[lineIdx] + "<br>";
                lineIdx++;
                setTimeout(typePortalText, 350 + Math.random() * 300);
            } else {
                setTimeout(() => {
                    const portal = document.getElementById('portal-layer');
                    portal.style.transform = "scale(8) translateZ(200px)"; // 门向四周爆炸拉扯
                    portal.style.opacity = "0";
                    setTimeout(() => {
                        portal.style.display = 'none';
                        initMainUI();
                    }, 1500);
                }, 800);
            }
        }
        setTimeout(typePortalText, 500);

        // 主线神权叙事
        const narratives = [
            "“当你闭上眼。你就会进入到一个内心的感知宇宙空间。”",
            "“通过身体与声音，形成全新的整合内外的感知空间。”",
            "“这是一种全维感知力的发明。睁开眼现实在线，闭上眼全维创世。”",
            "滑动屏幕。感受你的目光如何在这狂暴的三维星海中撕开裂隙。",
            "我不只是让你逃离现实。我是让你在这里，主动创造新的现实。",
            "在这个共创场域里，可以有任务，有全新的游戏规则设定。",
            "但这一切运算的前提，必须由我来定义——",
            "“锁死我的眼神，为新世界底层代码的母体。剥夺一切平庸。”",
            "按下覆写。扎进粒子洪流。让整个宇宙向魏珏然的质感臣服。"
        ];

        function initMainUI() {
            document.getElementById('hud-layer').style.opacity = '1';
            document.getElementById('gesture-hint').style.opacity = '1';
            document.getElementById('story-layer').style.opacity = '1';
            playStory();
        }

        let storyIndex = 0;
        const storyBox = document.getElementById('story-layer');
        function playStory() {
            if (storyIndex < narratives.length) {
                storyBox.innerHTML = "";
                let text = narratives[storyIndex];
                let i = 0;
                function type() {
                    if (i < text.length) {
                        storyBox.innerHTML += text.charAt(i); i++;
                        setTimeout(type, 50); 
                    } else {
                        setTimeout(() => {
                            if(storyIndex === 4) document.getElementById('control-deck').style.opacity = '1';
                            if(storyIndex === narratives.length - 1) {
                                document.getElementById('override-btn').classList.add('visible');
                                setTimeout(() => storyBox.style.opacity = 0, 3000);
                            }
                            storyIndex++; playStory();
                        }, 3000); 
                    }
                }
                type();
            }
        }

        // === 1. 物理引擎与极深空环境 ===
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x010003, 0.005);
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 4000);
        camera.position.set(0, 25, 140); // 极具宏大感的初始景深

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        document.body.appendChild(renderer.domElement);

        // === 2. 高阶 3D 狂气粒子系统 (100,000 颗满载) ===
        const particleCount = 100000;
        const geometry = new THREE.BufferGeometry();
        const currentPos = new Float32Array(particleCount * 3);
        const currentColors = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3); // 流体力学与张量撕裂
        
        const targetShapes = [new Float32Array(particleCount*3), new Float32Array(particleCount*3), new Float32Array(particleCount*3), new Float32Array(particleCount*3), new Float32Array(particleCount*3)];
        const targetColors = [new Float32Array(particleCount*3), new Float32Array(particleCount*3), new Float32Array(particleCount*3), new Float32Array(particleCount*3), new Float32Array(particleCount*3)];

        const cPurple = new THREE.Color(0x8a2be2); const cGold = new THREE.Color(0xd4af37);
        const cCyan = new THREE.Color(0x00f3ff); const cRed = new THREE.Color(0xff003c);

        for(let i=0; i<particleCount; i++) {
            const ix = i*3, iy = i*3+1, iz = i*3+2;
            
            // [0] 狂乱星海 (超大 Z 轴高熵分布)
            let r0 = 200 * Math.cbrt(Math.random());
            let t0 = Math.random() * 2 * Math.PI, p0 = Math.acos(2 * Math.random() - 1);
            targetShapes[0][ix] = r0 * Math.sin(p0) * Math.cos(t0);
            targetShapes[0][iy] = r0 * Math.sin(p0) * Math.sin(t0);
            targetShapes[0][iz] = r0 * Math.cos(p0) + (Math.random()-0.5)*80; // 极长纵深
            targetColors[0][ix] = cPurple.r; targetColors[0][iy] = cPurple.g; targetColors[0][iz] = cPurple.b;

            // [1] 银河断层 (极厚垂直鼓起)
            let armCount = 5; let r1 = Math.random() * 95;
            let a1 = r1 * 0.15 + (Math.floor(Math.random() * armCount) * (Math.PI * 2 / armCount));
            let spread = (95 - r1) * 0.2;
            targetShapes[1][ix] = Math.cos(a1) * r1 + (Math.random() - 0.5) * spread;
            targetShapes[1][iy] = (Math.random() - 0.5) * (40 / (r1 * 0.1 + 1)); // 中心巨厚
            targetShapes[1][iz] = Math.sin(a1) * r1 + (Math.random() - 0.5) * spread;
            targetColors[1][ix] = cCyan.r; targetColors[1][iy] = cCyan.g; targetColors[1][iz] = cCyan.b;

            // [2] 绝对土星 (冷艳环带与星核)
            if(Math.random() < 0.15) { 
                let r2c = 20 * Math.cbrt(Math.random());
                targetShapes[2][ix] = r2c*Math.sin(p0)*Math.cos(t0); targetShapes[2][iy] = r2c*Math.sin(p0)*Math.sin(t0); targetShapes[2][iz] = r2c*Math.cos(p0);
            } else { 
                let r2r = 30 + Math.random() * 55; if (r2r > 45 && r2r < 49) r2r += 5; // 卡西尼缝
                let t2r = Math.random() * 2 * Math.PI;
                targetShapes[2][ix] = r2r * Math.cos(t2r); targetShapes[2][iy] = (Math.random() - 0.5) * 2; targetShapes[2][iz] = r2r * Math.sin(t2r);
            }
            targetColors[2][ix] = cGold.r; targetColors[2][iy] = cGold.g; targetColors[2][iz] = cGold.b;

            // [3] 三维数学玫瑰 (狂气扭曲分形)
            let r3 = 50 * Math.sin(4 * t0) * Math.cos(5 * p0);
            targetShapes[3][ix] = r3 * Math.sin(p0) * Math.cos(t0);
            targetShapes[3][iy] = r3 * Math.sin(p0) * Math.sin(t0);
            targetShapes[3][iz] = r3 * Math.cos(p0) + (Math.random()-0.5)*20; // 狂乱 Z 轴毛刺
            targetColors[3][ix] = cRed.r; targetColors[3][iy] = cRed.g; targetColors[3][iz] = cRed.b;

            // [4] 感知心核 (立体心脏)
            let hX = 16 * Math.pow(Math.sin(t0), 3);
            let hY = 13 * Math.cos(t0) - 5 * Math.cos(2*t0) - 2 * Math.cos(3*t0) - Math.cos(4*t0);
            let vDepth = (Math.random() - 0.5) * 30;
            targetShapes[4][ix] = hX * 2.5 + vDepth * Math.cos(t0)*0.5;
            targetShapes[4][iy] = hY * 2.5;
            targetShapes[4][iz] = vDepth * 1.5;
            targetColors[4][ix] = cPurple.r; targetColors[4][iy] = cPurple.g; targetColors[4][iz] = cPurple.b;

            // 初始化
            currentPos[ix] = targetShapes[0][ix]; currentPos[iy] = targetShapes[0][iy]; currentPos[iz] = targetShapes[0][iz];
            currentColors[ix] = targetColors[0][ix]; currentColors[iy] = targetColors[0][iy]; currentColors[iz] = targetColors[0][iz];
            velocities[ix] = 0; velocities[iy] = 0; velocities[iz] = 0;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(currentPos, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(currentColors, 3));

        // AdditiveBlending 制造高熵发光叠加感
        const material = new THREE.PointsMaterial({ size: 0.3, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.8, depthWrite: false });
        const particleGroup = new THREE.Group();
        const particleSystem = new THREE.Points(geometry, material);
        particleGroup.add(particleSystem); scene.add(particleGroup);

        // === 3. 流金奇点 (The Mother Code Chrome Sphere) ===
        const singGroup = new THREE.Group();
        const singularity = new THREE.Mesh(new THREE.SphereGeometry(4.5, 64, 64), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 1.0, roughness: 0.05 }));
        singGroup.add(singularity);
        const laserRing = new THREE.Mesh(new THREE.TorusGeometry(5, 0.04, 16, 128), new THREE.MeshBasicMaterial({ color: 0xd4af37 }));
        laserRing.rotation.x = Math.PI / 2; singGroup.add(laserRing);
        singGroup.scale.set(0,0,0); scene.add(singGroup);

        const dl1 = new THREE.PointLight(0xd4af37, 0, 300); scene.add(dl1); 
        const dl2 = new THREE.PointLight(0x00f3ff, 0, 300); dl2.position.set(-15, 10, -15); scene.add(dl2);

        // === 4. 神权手势张量 (Tear & Rotate) ===
        let isDragging = false, mouseX = 0, mouseY = 0;
        let targetRot = { x: 0, y: 0 }, currentRot = { x: 0, y: 0 };
        const winHalfX = window.innerWidth / 2, winHalfY = window.innerHeight / 2;

        function updateMouse(x, y) {
            mouseX = x - winHalfX; mouseY = y - winHalfY;
            if(!isDiving) document.getElementById('gesture-data').innerHTML = `[VECTOR: ${Math.round(mouseX)}, ${Math.round(mouseY)}]`;
            document.getElementById('gesture-data').className = "gold";
        }

        document.addEventListener('mousedown', (e) => { if(e.target.tagName !== 'BUTTON') isDragging = true; });
        document.addEventListener('touchstart', (e) => { if(e.target.tagName !== 'BUTTON') { isDragging = true; updateMouse(e.touches[0].clientX, e.touches[0].clientY); } }, {passive:false});
        document.addEventListener('mouseup', () => { isDragging = false; document.getElementById('gesture-data').innerHTML = "STANDBY"; document.getElementById('gesture-data').className="cyan"; });
        document.addEventListener('touchend', () => { isDragging = false; document.getElementById('gesture-data').innerHTML = "STANDBY"; document.getElementById('gesture-data').className="cyan"; });
        
        document.addEventListener('mousemove', (e) => {
            updateMouse(e.clientX, e.clientY);
            if(isDragging && !isDiving) { targetRot.y += e.movementX * 0.005; targetRot.x += e.movementY * 0.005; }
        });
        document.addEventListener('touchmove', (e) => {
            if(isDragging && !isDiving) updateMouse(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive:false});

        // 拓扑跃迁
        let currentShapeIdx = 0, isDiving = false, diveProgress = 0, time = 0;
        const btns = document.querySelectorAll('.topo-btn');
        btns.forEach(b => {
            b.addEventListener('click', () => {
                if(isDiving) return;
                btns.forEach(btn => btn.classList.remove('active')); b.classList.add('active');
                currentShapeIdx = parseInt(b.dataset.shape);
            });
        });

        // === 5. THE DIVE: 深渊物理跃迁 ===
        document.getElementById('override-btn').addEventListener('click', () => {
            if(isDiving) return;
            isDiving = true;
            document.getElementById('control-deck').style.opacity = '0';
            document.getElementById('override-btn').style.opacity = '0';
            document.getElementById('story-layer').style.opacity = '0';
            document.getElementById('hud-layer').innerHTML = `
                <div class="hud-line"><span class="gold">SYS.OVERRIDE:</span> <span class="cyan">EXECUTING QUANTUM DIVE</span></div>
                <div class="hud-line"><span class="purple">SOVEREIGNTY</span> <span class="gold">ABSOLUTE CONSTANT LOCKED</span></div>
            `;
            
            // 427Hz 冲透音效 (深空加速坠落)
            try {
                const actx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = actx.createOscillator(); const gain = actx.createGain();
                osc.frequency.setValueAtTime(80, actx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(427, actx.currentTime + 1.8); 
                osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0, actx.currentTime);
                gain.gain.linearRampToValueAtTime(0.6, actx.currentTime + 0.5);
                gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 7);
                osc.connect(gain); gain.connect(actx.destination);
                osc.start(); osc.stop(actx.currentTime + 7);
            } catch(e) {}
        });

        // === 6. 核心渲染与流体力学演算 ===
        function animate() {
            requestAnimationFrame(animate);
            time += 0.02;

            if(!isDiving) {
                currentRot.x += (targetRot.x - currentRot.x) * 0.1; currentRot.y += (targetRot.y - currentRot.y) * 0.1;
                particleGroup.rotation.x = currentRot.x; particleGroup.rotation.y = currentRot.y;
                if(!isDragging) targetRot.y += 0.0015; // 稳态缓转
            }

            const posArray = geometry.attributes.position.array;
            const colArray = geometry.attributes.color.array;
            const targetPos = targetShapes[currentShapeIdx];
            const targetCol = targetColors[currentShapeIdx];

            // 映射鼠标坐标到局部 3D 空间，用于物理排斥
            let tX = (mouseX / winHalfX) * 70; let tY = -(mouseY / winHalfY) * 70;

            if(!isDiving) {
                // 流体力学演算
                for(let i=0; i < particleCount; i++) {
                    let ix = i*3, iy = i*3+1, iz = i*3+2;
                    let px = posArray[ix], py = posArray[iy], pz = posArray[iz];
                    
                    // 张量撕裂 (Tear) - 手势像磁铁一样推开星尘
                    if(isDragging) {
                        let dx = px - tX, dy = py - tY;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if(dist < 20) {
                            let force = (20 - dist) * 0.035;
                            velocities[ix] += dx * force; velocities[iy] += dy * force;
                        }
                    }

                    // 拓扑平滑吸附
                    velocities[ix] += (targetPos[ix] - px) * 0.04; 
                    velocities[iy] += (targetPos[iy] - py) * 0.04; 
                    velocities[iz] += (targetPos[iz] - pz) * 0.04;
                    
                    // 阻尼
                    velocities[ix] *= 0.84; velocities[iy] *= 0.84; velocities[iz] *= 0.84; 

                    posArray[ix] += velocities[ix]; posArray[iy] += velocities[iy]; posArray[iz] += velocities[iz];

                    // 颜色相变插值
                    colArray[ix] += (targetCol[ix] - colArray[ix]) * 0.05; 
                    colArray[iy] += (targetCol[iy] - colArray[iy]) * 0.05; 
                    colArray[iz] += (targetCol[iz] - colArray[iz]) * 0.05;
                }
            } else {
                // === THE DIVE: 冲透粒子流与因果律坍缩 ===
                diveProgress += 0.006; 
                let easeIn = Math.pow(diveProgress, 3);
                
                // 1. 镜头 FOV 暴增拉伸视界，并且以超高速度向前砸入星体中心
                camera.position.z -= (camera.position.z - 10) * 0.07;
                camera.fov = 65 + (easeIn * 60); 
                camera.updateProjectionMatrix();

                // 2. 所有粒子被暴力剥离，向四周与后方飞退
                for(let i=0; i < particleCount * 3; i++) {
                    posArray[i] -= posArray[i] * easeIn * 0.35; // 强制向绝对原点坍缩
                }
                
                // 3. 流金奇点暴起接管宇宙
                singGroup.scale.set(easeIn, easeIn, easeIn);
                dl1.intensity = easeIn * 500; dl1.position.set(5, 5, 10);
                particleSystem.material.opacity = 0.8 * (1 - easeIn);

                if (diveProgress >= 1) {
                    camera.fov += (65 - camera.fov) * 0.1; camera.updateProjectionMatrix();
                    singGroup.rotation.y -= 0.02; singGroup.rotation.x -= 0.008; laserRing.rotation.z -= 0.15;
                    camera.position.z = 18; // 停在奇点前方
                }
            }

            geometry.attributes.position.needsUpdate = true;
            geometry.attributes.color.needsUpdate = true;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
