<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>魏珏然 / 427Hz Sovereign Metaverse</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Serif+SC:wght@700&display=swap');
        
        body { 
            margin: 0; overflow: hidden; background-color: #020305; color: #fff; 
            font-family: 'Orbitron', sans-serif; user-select: none; 
            cursor: crosshair; touch-action: none;
        }
        
        /* 赛博扫描线与暗金微粒背底 */
        #fx-layer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 50%, rgba(0,255,255,0.03) 50%),
                        radial-gradient(circle at center, transparent 30%, #010203 100%);
            background-size: 100% 4px, 100% 100%; pointer-events: none; z-index: 0; opacity: 0.8;
            box-shadow: inset 0 0 150px rgba(212, 175, 55, 0.08);
        }

        /* 顶部/左侧高级 流金蒸汽 HUD */
        #hud-layer { 
            position: absolute; top: 40px; left: 40px; z-index: 5; pointer-events: none; 
            border-left: 4px solid #D4AF37; padding: 25px;
            background: linear-gradient(135deg, rgba(10, 15, 20, 0.8), rgba(5, 5, 10, 0.6)); 
            backdrop-filter: blur(12px);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.15), inset 0 0 15px rgba(0, 243, 255, 0.05);
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
        }
        .hud-title { font-size: 18px; font-weight: 900; letter-spacing: 4px; margin-bottom: 15px; color: #D4AF37; text-shadow: 0 0 10px rgba(212, 175, 55, 0.8); border-bottom: 1px solid rgba(212, 175, 55, 0.3); padding-bottom: 10px;}
        .hud-line { font-size: 11px; margin-bottom: 12px; letter-spacing: 3px; display: flex; justify-content: space-between; gap: 40px; color: #88aadd;}
        .gold { color: #D4AF37; text-shadow: 0 0 8px rgba(212, 175, 55, 0.8); font-weight: bold;}
        .cyan { color: #00F3FF; text-shadow: 0 0 8px rgba(0, 243, 255, 0.8); font-weight: bold;}

        /* 右侧流金拓扑控制台 */
        #control-deck {
            position: absolute; top: 50%; right: 40px; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 18px; z-index: 10;
            opacity: 0; pointer-events: none; transition: opacity 1s ease;
        }
        #control-deck.visible { opacity: 1; pointer-events: auto; }
        
        .topo-btn {
            background: rgba(5, 10, 15, 0.7); color: #00F3FF; font-family: 'Orbitron', sans-serif;
            border: 1px solid rgba(0, 243, 255, 0.3); border-right: 3px solid #00F3FF;
            padding: 15px 30px; font-size: 13px; font-weight: 700;
            letter-spacing: 4px; cursor: pointer; text-align: right; position: relative; overflow: hidden;
            backdrop-filter: blur(8px); clip-path: polygon(15px 0, 100% 0, 100% 100%, 0 100%, 0 15px);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .topo-btn::before {
            content: ''; position: absolute; left: -100%; top: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
            transition: left 0.5s ease;
        }
        .topo-btn:hover::before { left: 100%; }
        .topo-btn:hover { background: rgba(0, 243, 255, 0.1); color: #fff; text-shadow: 0 0 8px #fff; padding-right: 40px; box-shadow: -5px 5px 15px rgba(0, 243, 255, 0.2);}
        .topo-btn.active {
            background: linear-gradient(90deg, rgba(212,175,55,0.15), rgba(5,10,15,0.8));
            border-color: #D4AF37; border-left: 4px solid #00F3FF; border-right: 1px solid #D4AF37; 
            color: #D4AF37; text-shadow: 0 0 10px #D4AF37; padding-right: 30px;
        }

        /* 叙事打字机 */
        #story-layer {
            position: absolute; top: 18%; left: 50%; transform: translate(-50%, 0);
            width: 85%; max-width: 900px; text-align: center; font-family: 'Noto Serif SC', serif;
            font-size: 20px; font-weight: bold; letter-spacing: 5px; z-index: 5; pointer-events: none;
            background: -webkit-linear-gradient(180deg, #D4AF37, #00F3FF);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3); line-height: 2.2;
        }

        /* 绝对主权覆写按钮 */
        #override-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(15,15,15,0.9), rgba(5,5,5,0.9)); backdrop-filter: blur(10px);
            border: 1px solid #D4AF37; border-top: 2px solid #00F3FF; border-bottom: 2px solid #00F3FF;
            color: #D4AF37; font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 900;
            padding: 20px 50px; cursor: pointer; letter-spacing: 6px; text-transform: uppercase;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2), inset 0 0 15px rgba(0, 243, 255, 0.1);
            clip-path: polygon(25px 0, 100% 0, 100% calc(100% - 25px), calc(100% - 25px) 100%, 0 100%, 0 25px);
            transition: all 0.4s ease; opacity: 0; pointer-events: none; z-index: 20;
        }
        #override-btn.visible { opacity: 1; pointer-events: auto; }
        #override-btn:hover {
            background: #D4AF37; box-shadow: 0 0 50px rgba(212, 175, 55, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.5);
            color: #000; text-shadow: none; border-color: #fff; letter-spacing: 10px;
        }
        
        #gesture-hint {
            position: absolute; bottom: 25px; left: 40px; font-size: 10px; color: rgba(255,255,255,0.3);
            letter-spacing: 3px; z-index: 5; pointer-events: none;
        }
        #gesture-hint span { color: #D4AF37; font-weight: bold; }
    </style>
</head>
<body>
    <div id="fx-layer"></div>

    <div id="hud-layer">
        <div class="hud-title">SOVEREIGN_OS V5</div>
        <div class="hud-line"><span>ROOT_ACCESS</span> <span class="gold">JUERAN_NEXUS</span></div>
        <div class="hud-line"><span>RESONANCE</span> <span class="cyan">427Hz CARRIER</span></div>
        <div class="hud-line"><span>TOPOLOGY</span> <span id="topo-state" class="gold">DEEP_SPACE</span></div>
        <div class="hud-line"><span>GAZE_TENSOR</span> <span id="gesture-data" class="cyan">STANDBY</span></div>
    </div>

    <div id="control-deck">
        <button class="topo-btn active" data-shape="0">01 / DEEP_SPACE [星海]</button>
        <button class="topo-btn" data-shape="1">02 / MILKY_WAY [银河]</button>
        <button class="topo-btn" data-shape="2">03 / SATURN_RING [土星]</button>
        <button class="topo-btn" data-shape="3">04 / MATH_ROSE [玫瑰]</button>
        <button class="topo-btn" data-shape="4">05 / QUALIA_HEART [心核]</button>
    </div>
    
    <div id="story-layer"></div>
    <div id="gesture-hint">[ TENSOR ACTIVE: <span>DRAG</span> TO ROTATE UNIVERSE ]</div>
    
    <button id="override-btn">[ EXECUTE SOVEREIGN OVERRIDE ]</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // === 0. 主权叙事引擎 ===
        const storyBox = document.getElementById('story-layer');
        const narratives = [
            "“当你闭上眼。你就会进入到一个内心的感知宇宙空间。”",
            "“这是一种全维感知力的发明。一个自己创造的内在宇宙。”",
            "按住屏幕，滑动指尖。你在用手势强行重塑整个宇宙的引力轴。",
            "拓扑跃迁权限已解锁，点击右侧，赋予算力全新的形态。",
            "现实与感知在这里被模糊。超现实，又无比 Grounded。",
            "但一切绚烂，最终都必须向我的绝对质感臣服。"
        ];
        
        let storyIndex = 0;
        function playStory() {
            if (storyIndex < narratives.length) {
                storyBox.innerHTML = "";
                let text = narratives[storyIndex];
                let i = 0;
                function type() {
                    if (i < text.length) {
                        storyBox.innerHTML += text.charAt(i); i++;
                        setTimeout(type, 50);
                    } else {
                        setTimeout(() => {
                            if(storyIndex === 3) document.getElementById('control-deck').classList.add('visible');
                            if(storyIndex === narratives.length - 1) document.getElementById('override-btn').classList.add('visible');
                            storyIndex++; playStory();
                        }, 2800);
                    }
                }
                type();
            } else { setTimeout(() => storyBox.style.opacity = 0, 1500); }
        }
        setTimeout(playStory, 1000);

        // === 1. 物理引擎与环境初始化 ===
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020305, 0.008);
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 30, 95);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // === 2. 粒子系统 (五维数学拓扑) ===
        const particleCount = 70000;
        const geometry = new THREE.BufferGeometry();
        const currentPos = new Float32Array(particleCount * 3);
        const currentColors = new Float32Array(particleCount * 3);
        
        const targetShapes = [
            new Float32Array(particleCount * 3), // 0: Starfield
            new Float32Array(particleCount * 3), // 1: Galaxy
            new Float32Array(particleCount * 3), // 2: Saturn
            new Float32Array(particleCount * 3), // 3: Rose
            new Float32Array(particleCount * 3)  // 4: Heart
        ];
        const targetColors = [
            new Float32Array(particleCount * 3), new Float32Array(particleCount * 3),
            new Float32Array(particleCount * 3), new Float32Array(particleCount * 3),
            new Float32Array(particleCount * 3)
        ];

        // 高级调色板 (流金、赛博青、绝对红、深空蓝)
        const cGold = new THREE.Color(0xD4AF37);
        const cCyan = new THREE.Color(0x00F3FF);
        const cCrimson = new THREE.Color(0xFF003C);
        const cBlue = new THREE.Color(0x0022AA);
        const cWhite = new THREE.Color(0xFFFFFF);

        for(let i=0; i<particleCount; i++) {
            const ix = i*3, iy = i*3+1, iz = i*3+2;
            
            // --- 0: 星海 (Deep Space) ---
            let r0 = 120 * Math.cbrt(Math.random());
            let t0 = Math.random() * 2 * Math.PI, p0 = Math.acos(2 * Math.random() - 1);
            targetShapes[0][ix] = r0 * Math.sin(p0) * Math.cos(t0);
            targetShapes[0][iy] = r0 * Math.sin(p0) * Math.sin(t0);
            targetShapes[0][iz] = r0 * Math.cos(p0);
            targetColors[0][ix] = cWhite.r; targetColors[0][iy] = cWhite.g; targetColors[0][iz] = cWhite.b;

            // --- 1: 银河 (Galaxy) ---
            let armCount = 5;
            let r1 = Math.random() * 55;
            let a1 = r1 * 0.2 + (Math.floor(Math.random() * armCount) * (Math.PI * 2 / armCount));
            let spread = (55 - r1) * 0.12;
            targetShapes[1][ix] = Math.cos(a1) * r1 + (Math.random() - 0.5) * spread;
            targetShapes[1][iy] = (Math.random() - 0.5) * (18 / (r1 * 0.15 + 1));
            targetShapes[1][iz] = Math.sin(a1) * r1 + (Math.random() - 0.5) * spread;
            let m1 = Math.random();
            targetColors[1][ix] = cCyan.r*m1 + cBlue.r*(1-m1);
            targetColors[1][iy] = cCyan.g*m1 + cBlue.g*(1-m1);
            targetColors[1][iz] = cCyan.b*m1 + cBlue.b*(1-m1);

            // --- 2: 土星 (Saturn) ---
            if (Math.random() < 0.15) { 
                let r2c = 12 * Math.cbrt(Math.random());
                let t2c = Math.random() * 2 * Math.PI, p2c = Math.acos(2 * Math.random() - 1);
                targetShapes[2][ix] = r2c * Math.sin(p2c) * Math.cos(t2c);
                targetShapes[2][iy] = r2c * Math.sin(p2c) * Math.sin(t2c);
                targetShapes[2][iz] = r2c * Math.cos(p2c);
                targetColors[2][ix] = cGold.r; targetColors[2][iy] = cGold.g; targetColors[2][iz] = cGold.b;
            } else { 
                let r2r = 18 + Math.random() * 32;
                if (r2r > 30 && r2r < 33) r2r += 3; // Cassini gap
                let t2r = Math.random() * 2 * Math.PI;
                targetShapes[2][ix] = r2r * Math.cos(t2r);
                targetShapes[2][iy] = (Math.random() - 0.5) * 0.4;
                targetShapes[2][iz] = r2r * Math.sin(t2r);
                let m2 = Math.random();
                targetColors[2][ix] = cGold.r*m2 + cCyan.r*(1-m2);
                targetColors[2][iy] = cGold.g*m2 + cCyan.g*(1-m2);
                targetColors[2][iz] = cGold.b*m2 + cCyan.b*(1-m2);
            }

            // --- 3: 玫瑰 (Math Rose) ---
            let t3 = Math.random() * Math.PI * 2;
            let p3 = Math.acos(2 * Math.random() - 1);
            let r3 = 30 * Math.sin(4 * t3) * Math.cos(5 * p3);
            targetShapes[3][ix] = r3 * Math.sin(p3) * Math.cos(t3);
            targetShapes[3][iy] = r3 * Math.sin(p3) * Math.sin(t3);
            targetShapes[3][iz] = r3 * Math.cos(p3);
            let m3 = Math.random();
            targetColors[3][ix] = cCrimson.r*m3 + cGold.r*(1-m3);
            targetColors[3][iy] = cCrimson.g*m3 + cGold.g*(1-m3);
            targetColors[3][iz] = cCrimson.b*m3 + cGold.b*(1-m3);

            // --- 4: 心核 (Qualia Heart) ---
            let t4 = Math.random() * Math.PI * 2;
            let p4 = Math.random() * Math.PI;
            let hX = 16 * Math.pow(Math.sin(t4), 3);
            let hY = 13 * Math.cos(t4) - 5 * Math.cos(2*t4) - 2 * Math.cos(3*t4) - Math.cos(4*t4);
            targetShapes[4][ix] = hX * 1.6;
            targetShapes[4][iy] = hY * 1.6;
            targetShapes[4][iz] = (Math.random() - 0.5) * 12 * Math.sin(p4);
            targetColors[4][ix] = cCrimson.r; targetColors[4][iy] = cCrimson.g; targetColors[4][iz] = cCrimson.b;

            // Init state
            currentPos[ix] = targetShapes[0][ix]; currentPos[iy] = targetShapes[0][iy]; currentPos[iz] = targetShapes[0][iz];
            currentColors[ix] = targetColors[0][ix]; currentColors[iy] = targetColors[0][iy]; currentColors[iz] = targetColors[0][iz];
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(currentPos, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(currentColors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.25, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.85
        });
        const particleGroup = new THREE.Group();
        const particleSystem = new THREE.Points(geometry, material);
        particleGroup.add(particleSystem);
        scene.add(particleGroup);

        // === 3. 奇点系统 (Override Model) ===
        const singGroup = new THREE.Group();
        const singularity = new THREE.Mesh(
            new THREE.SphereGeometry(4, 64, 64), 
            new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 1.0, roughness: 0.1 })
        );
        singGroup.add(singularity);
        const laserRing = new THREE.Mesh(
            new THREE.TorusGeometry(4.5, 0.05, 16, 128), 
            new THREE.MeshBasicMaterial({ color: 0xD4AF37 }) // 流金切环
        );
        laserRing.rotation.x = Math.PI / 2;
        singGroup.add(laserRing);
        singGroup.scale.set(0,0,0);
        scene.add(singGroup);

        const dl1 = new THREE.PointLight(0xD4AF37, 0, 200); scene.add(dl1); // 流金高光
        const dl2 = new THREE.PointLight(0x00F3FF, 0, 200); dl2.position.set(-10, 5, -10); scene.add(dl2);

        // === 4. 手动神权手势引擎 (Gesture Tensor) ===
        let isDragging = false;
        let prevMouse = { x: 0, y: 0 };
        let targetRot = { x: 0, y: 0 };
        let currentRot = { x: 0, y: 0 };

        function onPointerDown(e) { if(e.target.tagName==='BUTTON')return; isDragging = true; prevMouse = {x: e.clientX||e.touches[0].clientX, y: e.clientY||e.touches[0].clientY}; }
        function onPointerUp() { isDragging = false; document.getElementById('gesture-data').innerHTML = "STANDBY"; document.getElementById('gesture-data').className="cyan";}
        function onPointerMove(e) {
            if(isDragging && !isCollapsing) {
                let cx = e.clientX||e.touches[0].clientX; let cy = e.clientY||e.touches[0].clientY;
                let dx = cx - prevMouse.x; let dy = cy - prevMouse.y;
                targetRot.y += dx * 0.005; targetRot.x += dy * 0.005;
                prevMouse = {x: cx, y: cy};
                document.getElementById('gesture-data').innerHTML = `TENSOR VECTOR [${dx}, ${dy}]`;
                document.getElementById('gesture-data').className = "gold";
            }
        }
        document.addEventListener('mousedown', onPointerDown); document.addEventListener('touchstart', onPointerDown, {passive:false});
        document.addEventListener('mouseup', onPointerUp); document.addEventListener('touchend', onPointerUp);
        document.addEventListener('mousemove', onPointerMove); document.addEventListener('touchmove', onPointerMove, {passive:false});

        // 缩放控制 (滚轮)
        document.addEventListener('wheel', (e) => {
            if(!isCollapsing) {
                camera.position.z += e.deltaY * 0.05;
                camera.position.z = Math.max(10, Math.min(camera.position.z, 200));
            }
        });

        // === 5. 拓扑相变控制 ===
        let currentShapeIdx = 0;
        let isCollapsing = false;
        let collapseVal = 0;
        
        const btns = document.querySelectorAll('.topo-btn');
        btns.forEach(b => {
            b.addEventListener('click', () => {
                if(isCollapsing) return;
                btns.forEach(btn => btn.classList.remove('active'));
                b.classList.add('active');
                currentShapeIdx = parseInt(b.dataset.shape);
                document.getElementById('topo-state').innerText = b.innerText.split('] ')[0].split('/ ')[1];
            });
        });

        // === 6. 绝对主权覆写 (The Override) ===
        document.getElementById('override-btn').addEventListener('click', () => {
            if(isCollapsing) return;
            isCollapsing = true;
            document.getElementById('control-deck').style.opacity = '0';
            document.getElementById('override-btn').style.opacity = '0';
            document.getElementById('hud-layer').innerHTML = `
                <div class="hud-line"><span class="gold">SYS.OP_MODE</span> <span class="cyan">[44271] SINGULARITY LOCKED</span></div>
                <div class="hud-line"><span class="gold">RESONANCE</span> <span class="cyan">427Hz FULL COVERAGE</span></div>
            `;
            
            // 427Hz 音效
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const actx = new AudioContext();
                const osc = actx.createOscillator(); const gain = actx.createGain();
                osc.frequency.value = 427; osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0, actx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.5, actx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 6);
                osc.connect(gain); gain.connect(actx.destination);
                osc.start(); osc.stop(actx.currentTime + 6);
            } catch(e) {}
        });

        // === 7. 渲染与流体力学插值循环 ===
        function animate() {
            requestAnimationFrame(animate);

            // 手势惯性旋转
            if(!isCollapsing) {
                currentRot.x += (targetRot.x - currentRot.x) * 0.1;
                currentRot.y += (targetRot.y - currentRot.y) * 0.1;
                particleGroup.rotation.x = currentRot.x;
                particleGroup.rotation.y = currentRot.y;
                if(!isDragging) targetRot.y += 0.002; // 极缓的宇宙自转
            }

            const posArray = geometry.attributes.position.array;
            const colArray = geometry.attributes.color.array;
            const targetPos = targetShapes[currentShapeIdx];
            const targetCol = targetColors[currentShapeIdx];

            if(!isCollapsing) {
                // 流金般平滑的拓扑相变 (Lerp)
                for(let i=0; i < particleCount * 3; i++) {
                    posArray[i] += (targetPos[i] - posArray[i]) * 0.035;
                    colArray[i] += (targetCol[i] - colArray[i]) * 0.035;
                }
                geometry.attributes.position.needsUpdate = true;
                geometry.attributes.color.needsUpdate = true;
            } else {
                // 物理坍缩：一切归于中心奇点
                if(collapseVal < 1.0) {
                    collapseVal += 0.012;
                    let ease = Math.pow(collapseVal, 4); // 强引力吸附曲线
                    
                    for(let i=0; i < particleCount * 3; i++) {
                        posArray[i] -= posArray[i] * ease * 0.3;
                    }
                    geometry.attributes.position.needsUpdate = true;

                    singGroup.scale.set(ease, ease, ease);
                    dl1.intensity = ease * 300; dl1.position.set(15, 10, 15);
                    dl2.intensity = ease * 200;
                    particleSystem.material.opacity = 1 - ease;
                    camera.position.z += (35 - camera.position.z) * 0.05; // 压迫感：镜头拉近
                } else {
                    singGroup.rotation.y -= 0.015; // 奇点极寒自转
                    singGroup.rotation.x -= 0.005;
                    laserRing.rotation.z -= 0.1; // 激光切割扫描
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
